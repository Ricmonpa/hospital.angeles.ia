# Railway: NO pongas "Custom Start Command" en el dashboard si usas Dockerfile.
# Si lo dejas en blanco, se usa el CMD del Dockerfile (arranque correcto).
# "cd web && ..." en el dashboard FALLA: Railway no usa shell y "cd" no es ejecutable.

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
